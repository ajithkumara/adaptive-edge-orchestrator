version: '3.8'
services:
  edge_node:
    image: python:3.10-slim
    container_name: edge_node
    cap_add:
      - NET_ADMIN
    networks:
      iot_net:
        ipv4_address: 172.28.0.10
    volumes:
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/edge:/app/edge
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/logs:/logs
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/config:/app/config
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/data:/app/data
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/scripts:/app/scripts
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
    command: >
      bash -c "pip install numpy scipy scikit-learn nats-py psutil requests -q &&
               echo '[edge_node] packages ready' &&
               sleep infinity"
  cloud_node:
    image: python:3.10-slim
    container_name: cloud_node
    networks:
      iot_net:
        ipv4_address: 172.28.0.20
    volumes:
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/logs:/logs
      - /mnt/c/Users/Laptop/Documents/workspace/adaptive-edge-orchestrator/config:/app/config
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 6G
    command: >
      bash -c "pip install numpy scipy scikit-learn nats-py psutil -q &&
               echo '[cloud_node] packages ready' &&
               sleep infinity"
  nats_broker:
    image: nats:latest
    container_name: nats_broker
    networks:
      iot_net:
        ipv4_address: 172.28.0.30
    ports:
      - "4222:4222"
      - "8222:8222"
    deploy:
      resources:
        limits:
          memory: 512M
    command: [ "--jetstream" ]
networks:
  iot_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
